<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>反重力系統 - Vanilla JS 原型</title>
    <style>
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #333; border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .controls { margin-top: 15px; text-align: center; }
        kbd { background: #555; padding: 2px 6px; border-radius: 4px; border-bottom: 2px solid #111; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        <p>控制方式 (模擬 AI 決策)：</p>
        <p><kbd>W</kbd> / <kbd>Right</kbd>: 保持前進 (Action 0) | <kbd>Space</kbd> / <kbd>Up</kbd>: 反重力跳躍 (Action 1) | <kbd>S</kbd> / <kbd>Left</kbd>: 煞車減速 (Action 2)</p>
        <p><kbd>D</kbd>: 空中衝刺 (Air Dash)</p>
    </div>

<script>
class AntigravityController {
    constructor() {
        this.state = {
            is_grounded: true, gravity_direction: 1, position_x: 50.0, position_y: 350.0,
            velocity_x: 0.0, velocity_y: 0.0, rotation: 0.0
        };
        this.config = {
            acceleration: 300.0, braking_force: 500.0, max_speed_x: 400.0,
            jump_launch_impulse: 500.0, gravity_force: 1200.0, air_dash_speed: 200.0,
            floor_y: 350.0, ceiling_y: 50.0
        };
    }
    cmdRunForward(deltaTime) {
        this.state.velocity_x += this.config.acceleration * deltaTime;
        if (this.state.velocity_x > this.config.max_speed_x) this.state.velocity_x = this.config.max_speed_x;
    }
    cmdBrake(deltaTime) {
        this.state.velocity_x -= this.config.braking_force * deltaTime;
        if (this.state.velocity_x < 0) this.state.velocity_x = 0;
    }
    cmdFlipGravity() {
        if (this.state.is_grounded) {
            this.state.gravity_direction *= -1; this.state.is_grounded = false;
            this.state.velocity_y = this.state.gravity_direction * -this.config.jump_launch_impulse;
        }
    }
    cmdAirDash() {
        if (!this.state.is_grounded) {
            this.state.velocity_x += this.config.air_dash_speed;
            if (this.state.velocity_x > this.config.max_speed_x * 1.5) this.state.velocity_x = this.config.max_speed_x * 1.5;
        }
    }
    step(action, deltaTime) {
        switch(action) {
            case 0: this.cmdRunForward(deltaTime); break;
            case 1: this.cmdFlipGravity(); this.cmdRunForward(deltaTime); break;
            case 2: this.cmdBrake(deltaTime); break;
        }
        this.updatePhysics(deltaTime);
        this.eventRotateSprite(deltaTime);
        return { ...this.state };
    }
    updatePhysics(deltaTime) {
        this.state.position_x += this.state.velocity_x * deltaTime;
        if (!this.state.is_grounded) this.state.velocity_y += (this.config.gravity_force * this.state.gravity_direction) * deltaTime;
        this.state.position_y += this.state.velocity_y * deltaTime;
        if (this.state.gravity_direction === 1 && this.state.position_y >= this.config.floor_y) {
            this.state.position_y = this.config.floor_y; this.state.velocity_y = 0; this.state.is_grounded = true;
        } else if (this.state.gravity_direction === -1 && this.state.position_y <= this.config.ceiling_y) {
            this.state.position_y = this.config.ceiling_y; this.state.velocity_y = 0; this.state.is_grounded = true;
        }
    }
    eventRotateSprite(deltaTime) {
        const targetRotation = this.state.gravity_direction === 1 ? 0 : Math.PI;
        this.state.rotation += (targetRotation - this.state.rotation) * 10.0 * deltaTime;
    }
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const player = new AntigravityController();
let lastTime = performance.now();
let currentAction = 0;

// 障礙物管理
let obstacles = [];
let nextSpawnDistance = 600;
let isGameOver = false;

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') currentAction = 1;
    else if (e.code === 'KeyS' || e.code === 'ArrowLeft') currentAction = 2;
    else if (e.code === 'KeyD') player.cmdAirDash();
});

window.addEventListener('keyup', (e) => {
    if (['Space', 'ArrowUp', 'KeyS', 'ArrowLeft'].includes(e.code)) currentAction = 0;
});

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#444';
    ctx.fillRect(0, 0, canvas.width, 50);
    ctx.fillRect(0, 350, canvas.width, 50);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    const offsetX = -(player.state.position_x % 100);
    for (let i = 0; i <= canvas.width / 100 + 1; i++) {
        ctx.beginPath(); ctx.moveTo(offsetX + i * 100, 50); ctx.lineTo(offsetX + i * 100, 350); ctx.stroke();
    }

    // 繪製障礙物
    ctx.fillStyle = '#ff3366';
    ctx.shadowBlur = 0;
    obstacles.forEach(obs => {
        const screenX = obs.x - player.state.position_x + 150;
        ctx.fillRect(screenX, obs.y, obs.width, obs.height);
    });

    ctx.save();
    ctx.translate(150, player.state.position_y); ctx.rotate(player.state.rotation);
    ctx.fillStyle = '#00ffcc'; ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 10;
    ctx.fillRect(-20, -20, 40, 40);
    ctx.fillStyle = '#000'; ctx.shadowBlur = 0; ctx.fillRect(5, -10, 8, 8);
    ctx.restore();
    ctx.fillStyle = '#fff'; ctx.font = '16px monospace';
    ctx.fillText(`Action: ${currentAction}`, 10, 20);
    ctx.fillText(`Velocity X: ${player.state.velocity_x.toFixed(1)}`, 10, 40);
    ctx.fillText(`Grounded: ${player.state.is_grounded}`, 150, 20);
    ctx.fillText(`Gravity Dir: ${player.state.gravity_direction}`, 150, 40);
}

function gameLoop(currentTime) {
    if (isGameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff3366';
        ctx.font = 'bold 48px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
        ctx.font = '24px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('重新整理網頁以重試', canvas.width / 2, canvas.height / 2 + 40);
        return;
    }

    const deltaTime = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    
    player.step(currentAction, deltaTime);

    // 障礙物生成邏輯
    if (player.state.position_x + canvas.width > nextSpawnDistance) {
        const isTop = Math.random() > 0.5;
        const width = 30 + Math.random() * 40;
        const height = 40 + Math.random() * 60;
        const y = isTop ? 50 : 350 - height;
        obstacles.push({ x: nextSpawnDistance, y: y, width: width, height: height });
        nextSpawnDistance += 300 + Math.random() * 300; // 隨機間距
    }

    // 移除過期障礙物
    obstacles = obstacles.filter(obs => obs.x + obs.width > player.state.position_x - 200);

    // 碰撞偵測
    const pLeft = player.state.position_x - 20;
    const pRight = player.state.position_x + 20;
    const pTop = player.state.position_y - 20;
    const pBottom = player.state.position_y + 20;

    for (let obs of obstacles) {
        if (pRight > obs.x + 5 && pLeft < obs.x + obs.width - 5 &&
            pBottom > obs.y + 5 && pTop < obs.y + obs.height - 5) {
            isGameOver = true; // 碰撞時留一點容錯空間 (+5 / -5)
        }
    }

    draw();
    if (currentAction === 1) currentAction = 0; 
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
